let _ac = null;
const ac = () => {if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();return _ac;};
const tone = (f, dur = 0.12, vol = 0.07, type = 'sine', delay = 0) => {
  try {
    const c = ac(),o = c.createOscillator(),g = c.createGain();
    o.connect(g);g.connect(c.destination);
    o.type = type;o.frequency.value = f;
    const t = c.currentTime + delay;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t);o.stop(t + dur);
  } catch (e) {}
};
const SFX = {

  trans: (m) => {if (m) return;tone(200, .22, .04, 'sawtooth');},
  reveal: (m) => {if (m) return;[392, 523, 659].forEach((f, i) => tone(f, .38, .05, 'sine', i * .13));}
};

// PARTICLE CANVAS
// ══════════════════════════════════════════════════════
const Particle = ({ size = 240, pal = 'neutral', morph = 0, loading = false, ripSig = 0 }) => {
  const cvs = useRef(null),anim = useRef(null),T = useRef(0);
  const ripT = useRef(0),lastRip = useRef(0);
  const palRef = useRef(pal),mRef = useRef(morph),lRef = useRef(loading);
  useEffect(() => {palRef.current = pal;}, [pal]);
  useEffect(() => {mRef.current = morph;}, [morph]);
  useEffect(() => {lRef.current = loading;}, [loading]);
  useEffect(() => {if (ripSig !== lastRip.current) {ripT.current = 0;lastRip.current = ripSig;}}, [ripSig]);

  useEffect(() => {
    const canvas = cvs.current;if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;canvas.height = size * dpr;
    canvas.style.width = size + 'px';canvas.style.height = size + 'px';
    ctx.scale(dpr, dpr);
    const cx = size / 2,cy = size / 2,baseR = size * .30,N = 10;

    const draw = () => {
      const t = T.current,p = PALETTES[palRef.current] || PALETTES.neutral;
      const m = mRef.current,load = lRef.current;
      ctx.clearRect(0, 0, size, size);
      // outer glow
      const numH = load ? 4 : 2;
      for (let h = 0; h < numH; h++) {
        const hr = baseR * (1.18 + h * .2) + Math.sin(t * 1.3 + h) * baseR * .03;
        const og = ctx.createRadialGradient(cx, cy, hr * .6, cx, cy, hr * 1.5);
        const rgb = hexRgb(p[0]);
        og.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},${.13 - h * .03})`);
        og.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(cx, cy, hr * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = og;ctx.fill();
      }
      // blob
      const pts = [];
      for (let i = 0; i < N; i++) {
        const ang = i / N * Math.PI * 2 - Math.PI / 2;
        let r = baseR;
        r += Math.sin(ang * 2 + t * 1.1) * baseR * .07;
        r += Math.sin(ang * 3 + t * .65) * baseR * .05;
        r += Math.cos(ang * 1.5 + t * 1.9) * baseR * .045;
        r += Math.sin(ang * 4 + t * .9) * baseR * .03;
        if (m > 0) {r += Math.sin(ang * 5 + t * 2.3) * baseR * .045 * m;r += Math.cos(ang * 7 + t * 1.6) * baseR * .03 * m;}
        if (load) {r += Math.sin(ang * 6 + t * 3) * baseR * .055;r += Math.cos(ang * 9 + t * 2.1) * baseR * .035;}
        const rt = ripT.current;
        if (rt < 1) r += Math.sin((1 - rt) * Math.PI * 3 - ang * 2) * baseR * .07 * (1 - rt);
        pts.push({ x: cx + Math.cos(ang) * r, y: cy + Math.sin(ang) * r });
      }
      ctx.beginPath();
      for (let i = 0; i < N; i++) {
        const p0 = pts[(i - 1 + N) % N],p1 = pts[i],p2 = pts[(i + 1) % N],p3 = pts[(i + 2) % N];
        const cp1x = p1.x + (p2.x - p0.x) / 6,cp1y = p1.y + (p2.y - p0.y) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6,cp2y = p2.y - (p3.y - p1.y) / 6;
        if (i === 0) ctx.moveTo(p1.x, p1.y);
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
      }
      ctx.closePath();
      const grd = ctx.createRadialGradient(cx - baseR * .2, cy - baseR * .25, 0, cx + baseR * .1, cy + baseR * .1, baseR * 1.4);
      const [ca, cb, cc] = p.map(hexRgb);
      grd.addColorStop(0, `rgba(${ca.r},${ca.g},${ca.b},.95)`);
      grd.addColorStop(.45, `rgba(${cb.r},${cb.g},${cb.b},.8)`);
      grd.addColorStop(1, `rgba(${cc.r},${cc.g},${cc.b},.5)`);
      ctx.save();ctx.shadowColor = p[0];ctx.shadowBlur = 32;ctx.fillStyle = grd;ctx.fill();ctx.restore();
      // highlight
      const sp = ctx.createRadialGradient(cx - baseR * .28, cy - baseR * .35, 0, cx - baseR * .08, cy - baseR * .1, baseR * .6);
      sp.addColorStop(0, 'rgba(255,255,255,.28)');sp.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sp;ctx.fill();
      // internal network
      if (m > .25) {
        ctx.save();ctx.clip();
        const nn = Math.floor(3 + m * 5);
        const nds = [];
        for (let n = 0; n < nn; n++) {
          const na = n / nn * Math.PI * 2 + t * .4;
          const nr = baseR * (.22 + .28 * (n % 2)) + Math.sin(t + n * 2) * baseR * .07;
          nds.push({ x: cx + Math.cos(na) * nr, y: cy + Math.sin(na) * nr });
        }
        for (let a = 0; a < nds.length; a++) for (let b = a + 1; b < nds.length; b++) {
          const d = Math.hypot(nds[a].x - nds[b].x, nds[a].y - nds[b].y);
          if (d < baseR * 1.1) {
            ctx.beginPath();ctx.moveTo(nds[a].x, nds[a].y);ctx.lineTo(nds[b].x, nds[b].y);
            ctx.strokeStyle = `rgba(255,255,255,${.2 * (1 - d / (baseR * 1.1)) * m})`;ctx.lineWidth = .7;ctx.stroke();
          }
        }
        nds.forEach((nd) => {ctx.beginPath();ctx.arc(nd.x, nd.y, 1.8, 0, Math.PI * 2);ctx.fillStyle = `rgba(255,255,255,${.5 * m})`;ctx.fill();});
        ctx.restore();
      }
      // orbs
      const no = Math.floor(5 + m * 5 + (load ? 4 : 0));
      for (let o = 0; o < no; o++) {
        const oa = o / no * Math.PI * 2 + t * (.4 + o * .06) + o * 1.1;
        const or = baseR * (1.28 + .17 * Math.sin(t * .9 + o * 1.3));
        const os = 1.5 + Math.sin(t * 1.4 + o) * .8;
        ctx.beginPath();ctx.arc(cx + Math.cos(oa) * or, cy + Math.sin(oa) * or, os, 0, Math.PI * 2);
        const oc = hexRgb(p[o % p.length]);
        ctx.shadowColor = p[o % p.length];ctx.shadowBlur = 7;
        ctx.fillStyle = `rgba(${oc.r},${oc.g},${oc.b},${.55 + .35 * Math.sin(t + o)})`;ctx.fill();
      }
    };

    const loop = () => {T.current += .014;if (ripT.current < 1) ripT.current += .025;draw();anim.current = requestAnimationFrame(loop);};
    loop();
    return () => cancelAnimationFrame(anim.current);
  }, [size]);

  return <canvas ref={cvs} style={{ display: 'block', cursor: 'pointer' }} />;
};

// ROSE CHART (SVG Radar)
// ══════════════════════════════════════════════════════
const RoseChart = ({ skills, c1, c2 }) => {
  const [progress, setProgress] = useState(0);
  const [hovered, setHovered] = useState(null);
  const svgSize = 220,cx = 110,cy = 110,maxR = 78;
  const N = skills.length;

  useEffect(() => {
    let p = 0,raf;
    const delay = setTimeout(() => {
      const step = () => {p = Math.min(p + .025, 1);setProgress(p);if (p < 1) raf = requestAnimationFrame(step);};
      step();
    }, 400);
    return () => {clearTimeout(delay);cancelAnimationFrame(raf);};
  }, []);

  const pt = (i, v) => {
    const ang = i / N * Math.PI * 2 - Math.PI / 2;
    const r = v / 100 * maxR * progress;
    return [cx + Math.cos(ang) * r, cy + Math.sin(ang) * r];
  };

  const poly = skills.map((s, i) => pt(i, s.v));
  const pathD = poly.map(([x, y], i) => `${i === 0 ? 'M' : 'L'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ') + 'Z';

  const gridLevels = [25, 50, 75, 100];
  const labelR = maxR + 20;

  return (
    <svg width={svgSize} height={svgSize} viewBox={`0 0 ${svgSize} ${svgSize}`} style={{ overflow: 'visible' }}>
      {gridLevels.map((lv) => {
        const gpts = skills.map((_, i) => {
          const ang = i / N * Math.PI * 2 - Math.PI / 2;
          const r = lv / 100 * maxR;
          return `${cx + Math.cos(ang) * r},${cy + Math.sin(ang) * r}`;
        }).join(' ');
        return <polygon key={lv} points={gpts} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="0.8" />;
      })}
      {skills.map((_, i) => {
        const ang = i / N * Math.PI * 2 - Math.PI / 2;
        return <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(ang) * maxR} y2={cy + Math.sin(ang) * maxR} stroke="rgba(255,255,255,0.1)" strokeWidth="0.6" />;
      })}
      <path d={pathD} fill={`${c1}22`} stroke={c1} strokeWidth="1.8" strokeLinejoin="round" style={{ filter: `drop-shadow(0 0 6px ${c1}60)` }} />
      {poly.map(([x, y], i) =>
      <circle key={i} cx={x} cy={y} r={hovered === i ? 5 : 3.5} fill={c1}
      style={{ filter: `drop-shadow(0 0 5px ${c1})`, cursor: 'pointer', transition: 'r 0.15s' }}
      onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} />
      )}
      {skills.map((s, i) => {
        const ang = i / N * Math.PI * 2 - Math.PI / 2;
        const lx = cx + Math.cos(ang) * labelR,ly = cy + Math.sin(ang) * labelR;
        const active = hovered === i;
        return (
          <g key={i} onMouseEnter={() => setHovered(i)} onMouseLeave={() => setHovered(null)} style={{ cursor: 'pointer' }}>
            <text x={lx} y={ly - .5} textAnchor="middle" dominantBaseline="middle"
            fontSize="9" fill={active ? c1 : "rgba(255,255,255,0.45)"} fontFamily="Space Grotesk,sans-serif" fontWeight={active ? 600 : 400}
            style={{ transition: 'fill 0.15s' }}>
              {s.n}
            </text>
            {active && <text x={lx} y={ly + 9} textAnchor="middle" fontSize="8" fill={c1} fontFamily="Space Grotesk,sans-serif" fontWeight={600}>{s.v}</text>}
          </g>);

      })}
    </svg>);

};

// ANSWER OPTION — with upward pulse
// ══════════════════════════════════════════════════════
const AnswerOpt = ({ text, idx, selected, onSelect, c1, disabled, multi }) => {
  const [pulses, setPulses] = useState([]);
  const handleClick = () => {
    if (disabled) return;
    if (!selected) {
      const id = Date.now();
      setPulses((pp) => [...pp, id]);
      setTimeout(() => setPulses((pp) => pp.filter((p) => p !== id)), 700);
    }
    onSelect(idx);
  };
  const selColor = c1 || '#FF6B9A';
  return (
    <div onClick={handleClick} style={{ position: 'relative', overflow: 'visible' }}>
      {pulses.map((id) =>
      <div key={id} style={{
        position: 'absolute', left: '50%', top: 0,
        width: 10, height: 10, marginLeft: -5,
        borderRadius: '50%', background: selColor,
        boxShadow: `0 0 8px ${selColor}`,
        pointerEvents: 'none', zIndex: 10,
        animation: 'pulseUp 0.65s ease-out forwards'
      }} />
      )}
      <div style={{
        padding: '13px 16px',
        background: selected ? `linear-gradient(135deg,${selColor}18,${selColor}0a)` : 'rgba(255,255,255,0.04)',
        border: `1px solid ${selected ? selColor + '44' : 'rgba(255,255,255,0.07)'}`,
        borderRadius: '13px', cursor: 'pointer',
        transform: selected ? 'scale(1.01)' : 'scale(1)',
        transition: 'all 0.2s ease',
        boxShadow: selected ? `0 4px 20px ${selColor}18` : 'none',
        display: 'flex', alignItems: 'flex-start', gap: '10px'
      }}>
        <div style={{
          width: 18, height: 18, minWidth: 18, borderRadius: multi ? '4px' : '50%',
          border: `1.5px solid ${selected ? selColor : 'rgba(255,255,255,0.2)'}`,
          background: selected ? `${selColor}25` : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          marginTop: '1px', flexShrink: 0, transition: 'all 0.18s'
        }}>
          {selected && <div style={{ width: 6, height: 6, borderRadius: multi ? '1px' : '50%', background: selColor }} />}
        </div>
        <span style={{ fontSize: '13px', lineHeight: 1.5, color: selected ? '#fff' : 'rgba(255,255,255,0.7)', transition: 'color 0.18s' }}>{text}</span>
      </div>
    </div>);

};

// QUIZ SCREEN
// ══════════════════════════════════════════════════════
const QuizScreen = ({ qIdx, answers, onAnswer, muted }) => {
  const q = QS[qIdx];
  const [sels, setSels] = useState(new Set());
  const [going, setGoing] = useState(false);
  const [vis, setVis] = useState(false);
  const [rip, setRip] = useState(0);

  useEffect(() => {setVis(false);setSels(new Set());const t = setTimeout(() => setVis(true), 60);return () => clearTimeout(t);}, [qIdx]);

  const getPal = () => {if (answers.length === 0) return 'neutral';const last = answers[answers.length - 1];return last in PALETTES ? last : 'neutral';};

  const handleSelect = (i) => {
    if (going) return;
    SFX.pick(muted);
    setRip((r) => r + 1);
    if (q.multi) {
      setSels((prev) => {
        const ns = new Set(prev);
        if (ns.has(i)) ns.delete(i);else if (ns.size < (q.max || 2)) ns.add(i);
        return ns;
      });
    } else {
      setSels(new Set([i]));
      // auto-advance for single select
      setTimeout(() => {
        setGoing(true);
        setTimeout(() => {onAnswer([q.a[i].k]);setGoing(false);}, 380);
      }, 600);
    }
  };

  const handleContinue = () => {
    if (sels.size === 0 || going) return;
    setGoing(true);
    const keys = [...sels].map((i) => q.a[i].k);
    setTimeout(() => {onAnswer(keys);setGoing(false);}, 380);
  };

  const progress = qIdx / QS.length;
  const morph = answers.length / QS.length;
  const isMulti = !!q.multi;

  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'radial-gradient(ellipse 75% 55% at 50% 28%, #150820 0%, #07070f 65%)',
      display: 'flex', flexDirection: 'column',
      opacity: vis && !going ? 1 : 0, transition: 'opacity 0.35s ease'
    }}>
      {/* Header */}
      <div style={{ padding: '50px 22px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '7px' }}>
          <span style={{ fontSize: '10px', color: 'rgba(255,255,255,0.28)', letterSpacing: '0.07em' }}>{qIdx + 1} / {QS.length}</span>
          <span style={{ fontSize: '9px', color: 'rgba(255,255,255,0.28)', letterSpacing: '0.1em', textTransform: 'uppercase', border: '1px solid rgba(255,255,255,0.1)', padding: '3px 9px', borderRadius: '100px' }}>{q.bname}</span>
        </div>
        <div style={{ height: '2px', background: 'rgba(255,255,255,0.07)', borderRadius: '1px', overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${progress * 100}%`, background: 'linear-gradient(90deg,#FF6B9A,#FF8A3D)', transition: 'width 0.5s ease', boxShadow: '0 0 10px rgba(255,107,154,0.5)' }} />
        </div>
      </div>

      {/* Particle */}
      <div style={{ display: 'flex', justifyContent: 'center', padding: '18px 0 10px' }}
      onClick={() => setRip((r) => r + 1)} onTouchStart={() => setRip((r) => r + 1)}>
        <Particle size={148} pal={getPal()} morph={morph} ripSig={rip} />
      </div>

      {/* Question */}
      <div style={{ padding: '0 24px 16px' }}>
        <p style={{ fontSize: '17px', fontWeight: 600, lineHeight: 1.4, color: '#fff', letterSpacing: '-0.02em', textAlign: 'center' }}>
          {q.q}
        </p>
        {isMulti && <p style={{ textAlign: 'center', fontSize: '11px', color: 'rgba(255,255,255,0.3)', marginTop: '6px', letterSpacing: '0.05em' }}>до {q.max} вариантов</p>}
      </div>

      {/* Answers */}
      <div style={{ flex: 1, padding: '0 18px', display: 'flex', flexDirection: 'column', gap: '8px', overflowY: 'auto' }}>
        {q.a.map((a, i) =>
        <AnswerOpt key={i} idx={i} text={a.t} selected={sels.has(i)}
        onSelect={handleSelect} c1={ARCHETYPES[a.k]?.c1} multi={isMulti}
        disabled={going || !sels.has(i) && isMulti && sels.size >= (q.max || 2)} />
        )}
      </div>

      {/* Continue for multi-select */}
      {isMulti &&
      <div style={{ padding: '12px 18px 28px' }}>
          <button onClick={handleContinue} disabled={sels.size === 0 || going} style={{
          width: '100%', height: '48px',
          background: sels.size > 0 ? 'linear-gradient(135deg,#FF6B9A,#FF8A3D)' : 'rgba(255,255,255,0.07)',
          border: 'none', borderRadius: '14px',
          color: sels.size > 0 ? '#fff' : 'rgba(255,255,255,0.3)',
          fontSize: '14px', fontWeight: 600, cursor: sels.size > 0 ? 'pointer' : 'default',
          transition: 'all 0.25s',
          boxShadow: sels.size > 0 ? '0 6px 20px rgba(255,107,154,0.3)' : 'none'
        }}>
            {sels.size > 0 ? `Продолжить (${sels.size}/${q.max})` : 'Выбери хотя бы один'}
          </button>
        </div>
      }
    </div>);

};

          <div style={{ display: 'flex', justifyContent: 'center' }}>
              <RoseChart skills={d.skills} c1={d.c1} c2={d.c2} />
            </div> :

          <div>
              {d.skills.map((s, i) => {
              const [w, setW] = useState(0);
              useEffect(() => {const t = setTimeout(() => setW(s.v), i * 120);return () => clearTimeout(t);}, []);
              return (
                <div key={i} style={{ marginBottom: i < d.skills.length - 1 ? '11px' : 0 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                      <span style={{ fontSize: '12px', color: 'rgba(255,255,255,0.6)' }}>{s.n}</span>
                      <span style={{ fontSize: '11px', color: d.c1, fontWeight: 500 }}>{s.v}</span>
                    </div>
                    <div style={{ height: '2.5px', background: 'rgba(255,255,255,0.07)', borderRadius: '2px', overflow: 'hidden' }}>
                      <div style={{ height: '100%', width: `${w}%`, background: `linear-gradient(90deg,${d.c1},${d.c2})`, borderRadius: '2px', transition: `width 1s ${i * 120}ms cubic-bezier(0.25,1,0.5,1)`, boxShadow: `0 0 6px ${d.c1}55` }} />
                    </div>
                  </div>);

            })}
            </div>
          }
        </div>

        {/* 8 result sections */}
        <div style={{ width: '100%', background: 'rgba(255,255,255,0.03)', border: '1px solid rgba(255,255,255,0.07)', borderRadius: '18px', padding: '4px 18px', marginBottom: '12px' }}>
          {d.sections.map((s, i) =>
          <ResultSection key={i} idx={i + 1} title={s.title} body={s.body} c1={d.c1} defaultOpen={i < 2} />
          )}
        </div>

        {/* Paid teaser */}
        <div style={{ width: '100%', borderRadius: '18px', overflow: 'hidden', marginBottom: '24px', position: 'relative' }}>
          <div style={{
            padding: '20px',
            background: 'rgba(255,255,255,0.03)',
            border: '1px solid rgba(255,255,255,0.1)',
            filter: 'blur(3px)',
            pointerEvents: 'none'
          }}>
            <p style={{ fontSize: '10px', color: 'rgba(255,255,255,0.4)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: '12px' }}>Специалисты со схожим профилем</p>
            {['Кристина А. · Архитектор роста · Яндекс', 'Михаил Т. · Архитектор роста · Авито', 'Анна В. · Архитектор роста · Сбер'].map((n, i) =>
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '10px' }}>
                <div style={{ width: 32, height: 32, borderRadius: '50%', background: `${d.c1}22`, border: `1px solid ${d.c1}33` }} />
                <div>
                  <p style={{ fontSize: '12px', color: 'rgba(255,255,255,0.5)' }}>{n}</p>
                  <p style={{ fontSize: '10px', color: 'rgba(255,255,255,0.25)' }}>Инверсионный профиль: {i === 0 ? 'Коннектор' : i === 1 ? 'Эмпатичный лидер' : 'Визионер'}</p>
                </div>
              </div>
            )}
          </div>
          <div style={{
            position: 'absolute', inset: 0,
            display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(7,7,15,0.6)', backdropFilter: 'blur(2px)',
            gap: '10px'
          }}>
            <div style={{ fontSize: '20px', opacity: 0.7 }}>🔒</div>
            <p style={{ fontSize: '13px', fontWeight: 600, color: '#fff', textAlign: 'center' }}>Найди своих<br />напарников</p>
            <p style={{ fontSize: '11px', color: 'rgba(255,255,255,0.4)', textAlign: 'center', maxWidth: '200px', lineHeight: 1.5 }}>Анкеты специалистов со схожим типом и идеальных партнёров</p>
            <button style={{
              padding: '10px 20px', background: `linear-gradient(135deg,${d.c1},${d.c2})`,
              border: 'none', borderRadius: '12px', color: '#fff', fontSize: '12px', fontWeight: 600, cursor: 'pointer',
              boxShadow: `0 4px 16px ${d.c1}40`
            }}>Открыть доступ</button>
          </div>
        </div>

        {/* Actions */}
        <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: '9px' }}>
          <button onClick={copy} style={{
            width: '100%', height: '50px',
            background: copied ? 'rgba(59,232,197,0.15)' : `linear-gradient(135deg,${d.c1},${d.c2})`,
            border: copied ? '1px solid rgba(59,232,197,0.4)' : 'none',
            borderRadius: '14px', color: '#fff', fontSize: '14px', fontWeight: 600, cursor: 'pointer',
            boxShadow: copied ? 'none' : `0 6px 22px ${d.c1}38`, transition: 'all 0.3s ease'
          }}>{copied ? '✓ Профиль скопирован' : 'Скопировать профиль'}</button>
          <button onClick={() => {SFX.trans(muted);onRestart();}} style={{
            width: '100%', height: '50px',
            background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.09)',
            borderRadius: '14px', color: 'rgba(255,255,255,0.6)', fontSize: '14px', fontWeight: 500, cursor: 'pointer'
          }}>Пройти заново</button>
        </div>

      </div>
    </div>);

};

// ══════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════
const calcResult = (answers) => {
  const c = {};answers.forEach((k) => {c[k] = (c[k] || 0) + 1;});
  return Object.entries(c).sort((a, b) => b[1] - a[1])[0][0];
};

const App = () => {
  const [screen, setScreen] = useState('intro');
  const [qIdx, setQIdx] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [blockPhase, setBlockPhase] = useState(1);
  const [muted, setMuted] = useState(false);

  useEffect(() => {
    try {const s = localStorage.getItem('cmq2');if (s) {const { screen: sc, qIdx: q, answers: a, blockPhase: bp } = JSON.parse(s);if (sc && q !== undefined && a) {setScreen(sc);setQIdx(q);setAnswers(a);if (bp) setBlockPhase(bp);}}} catch (e) {}
  }, []);
  useEffect(() => {
    try {localStorage.setItem('cmq2', JSON.stringify({ screen, qIdx, answers, blockPhase }));} catch (e) {}
  }, [screen, qIdx, answers, blockPhase]);

  const handleStart = () => {setQIdx(0);setAnswers([]);setScreen('quiz');};

  const handleAnswer = (keys) => {
    const next = [...answers, ...keys];
    setAnswers(next);
    const answeredIdx = qIdx;
    if (answeredIdx === 2) {setQIdx(3);setBlockPhase(1);setScreen('blockReward');} else
    if (answeredIdx === 5) {setQIdx(6);setBlockPhase(2);setScreen('blockReward');} else
    if (answeredIdx === 8) {setScreen('loading');} else
    {setQIdx(qIdx + 1);}
  };

  const archetype = answers.length >= QS.length ? calcResult(answers) : 'A';

  return (
    <div className="phone">
      {screen === 'intro' && <IntroScreen onStart={handleStart} muted={muted} setMuted={setMuted} />}
      {screen === 'quiz' && <QuizScreen qIdx={qIdx} answers={answers} onAnswer={handleAnswer} muted={muted} />}
      {screen === 'blockReward' && <BlockReward phase={blockPhase} answers={answers} onContinue={() => setScreen('quiz')} muted={muted} />}
      {screen === 'loading' && <LoadingScreen onDone={() => setScreen('result')} muted={muted} />}
      {screen === 'result' && <ResultScreen archetype={archetype} onRestart={() => {setScreen('intro');setQIdx(0);setAnswers([]);}} muted={muted} />}
    </div>);

};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
